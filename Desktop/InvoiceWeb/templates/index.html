<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            max-height: 90vh;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        
        .form-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
            height: 100%;
        }
        
        .invoices-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="tel"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .invoice-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: transform 0.2s;
        }
        
        .invoice-item:hover {
            transform: translateX(5px);
            background: #e8eaf6;
        }
        
        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .invoice-id {
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
        }
        
        .invoice-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .type-advance {
            background: #ffe0b2;
            color: #e65100;
        }
        
        .type-rest {
            background: #bbdefb;
            color: #1565c0;
        }
        
        .type-final {
            background: #c8e6c9;
            color: #2e7d32;
        }
        
        .invoice-details {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .invoice-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            flex: 1;
        }
        
        .btn-download {
            background: #4caf50;
        }
        
        .btn-download:hover {
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .btn-delete {
            background: #f44336;
        }
        
        .btn-delete:hover {
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.4);
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        #invoicesList {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #333;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .no-invoices {
            text-align: center;
            color: #999;
            padding: 30px 10px;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success-message {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form Section -->
        <div class="form-section">
            <h1>📄 Invoice Generator</h1>
            <p class="subtitle">Create and manage invoices easily</p>
            
            <div id="alert"></div>
            
            <form id="invoiceForm">
                <div class="form-group">
                    <label>Customer Name *</label>
                    <input type="text" id="customerName" required placeholder="Enter customer name">
                </div>
                
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="phone" required placeholder="Enter phone number">
                </div>
                
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="description" required placeholder="Enter invoice description"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Total Amount ($) *</label>
                    <input type="number" id="totalAmount" step="0.01" required placeholder="0.00">
                </div>
                
                <div class="form-group">
                    <label>Payment Type *</label>
                    <div style="display: flex; gap: 20px; margin-top: 8px;">
                        <label style="display: flex; align-items: center; margin-bottom: 0; font-weight: 400; cursor: pointer;">
                            <input type="radio" name="paymentType" value="advance" checked style="margin-right: 8px; cursor: pointer;">
                            Advance
                        </label>
                        <label style="display: flex; align-items: center; margin-bottom: 0; font-weight: 400; cursor: pointer;">
                            <input type="radio" name="paymentType" value="rest" style="margin-right: 8px; cursor: pointer;">
                            Rest
                        </label>
                        <label style="display: flex; align-items: center; margin-bottom: 0; font-weight: 400; cursor: pointer;">
                            <input type="radio" name="paymentType" value="full" style="margin-right: 8px; cursor: pointer;">
                            Full
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label id="amountLabel">Advance Paid ($) *</label>
                    <input type="number" id="advancePaid" step="0.01" required placeholder="0.00">
                </div>
                
                <div class="form-group" id="restAmountGroup" style="display: none;">
                    <label>Rest Amount ($)</label>
                    <input type="number" id="restAmount" step="0.01" placeholder="0.00" disabled style="background-color: #f5f5f5;">
                </div>
                
                <button type="submit">✨ Generate Invoice</button>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    Creating invoice...
                </div>
            </form>
        </div>
        
        <!-- Invoices List Section -->
        <div class="invoices-section">
            <h1>📋 All Invoices</h1>
            <p class="subtitle">View and manage your invoices</p>
            
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all" onclick="filterInvoices('all')">All</button>
                <button class="filter-btn" data-filter="advance" onclick="filterInvoices('advance')">Advance</button>
                <button class="filter-btn" data-filter="rest" onclick="filterInvoices('rest')">Rest</button>
                <button class="filter-btn" data-filter="full" onclick="filterInvoices('full')">Full</button>
            </div>
            
            <div id="invoicesList" class="no-invoices">
                No invoices yet. Create one to get started!
            </div>
        </div>
    </div>
    
    <script>
        // Global filter state
        let currentFilter = 'all';
        
        // Load invoices on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadInvoices();
            setupPaymentTypeHandlers();
        });
        
        // Handle payment type changes
        function setupPaymentTypeHandlers() {
            const paymentTypeRadios = document.querySelectorAll('input[name="paymentType"]');
            const totalAmountInput = document.getElementById('totalAmount');
            const advancePaidInput = document.getElementById('advancePaid');
            const restAmountGroup = document.getElementById('restAmountGroup');
            const restAmountInput = document.getElementById('restAmount');
            const amountLabel = document.getElementById('amountLabel');
            
            // Function to calculate rest amount
            function calculateRestAmount() {
                const totalAmount = parseFloat(totalAmountInput.value);
                const advanced = parseFloat(advancePaidInput.value);
                if (!isNaN(totalAmount) && !isNaN(advanced) && totalAmount > 0) {
                    const rest = totalAmount - advanced;
                    restAmountInput.value = rest.toFixed(2);
                } else {
                    restAmountInput.value = '';
                }
            }
            
            paymentTypeRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const selectedType = e.target.value;
                    const totalAmount = parseFloat(totalAmountInput.value);
                    
                    if (selectedType === 'advance') {
                        // Advance selected - user enters partial amount
                        amountLabel.textContent = 'Advance Paid ($) *';
                        advancePaidInput.disabled = false;
                        advancePaidInput.style.backgroundColor = 'white';
                        advancePaidInput.value = '';
                        restAmountGroup.style.display = 'none';
                    } else if (selectedType === 'rest') {
                        // Rest selected - user enters already paid amount, system calculates rest
                        amountLabel.textContent = 'Advanced Amount ($) *';
                        advancePaidInput.disabled = false;
                        advancePaidInput.style.backgroundColor = 'white';
                        advancePaidInput.value = '';
                        restAmountGroup.style.display = 'block';
                    } else if (selectedType === 'full') {
                        // Full selected - auto-fill both fields
                        amountLabel.textContent = 'Full Amount ($) *';
                        if (!isNaN(totalAmount) && totalAmount > 0) {
                            advancePaidInput.value = totalAmount.toFixed(2);
                        }
                        advancePaidInput.disabled = true;
                        advancePaidInput.style.backgroundColor = '#f5f5f5';
                        restAmountGroup.style.display = 'none';
                    }
                });
            });
            
            // Update rest amount when advanced amount changes
            advancePaidInput.addEventListener('input', () => {
                const selectedType = document.querySelector('input[name="paymentType"]:checked').value;
                if (selectedType === 'rest') {
                    calculateRestAmount();
                }
            });
            
            // Update amounts when totalAmount changes
            totalAmountInput.addEventListener('change', () => {
                const selectedType = document.querySelector('input[name="paymentType"]:checked').value;
                const totalAmount = parseFloat(totalAmountInput.value);
                
                if (selectedType === 'rest') {
                    calculateRestAmount();
                } else if (selectedType === 'full') {
                    if (!isNaN(totalAmount) && totalAmount > 0) {
                        advancePaidInput.value = totalAmount.toFixed(2);
                    }
                }
            });
        }
        
        // Form submission
        document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            const alert = document.getElementById('alert');
            
            // Clear previous alerts
            alert.innerHTML = '';
            loading.style.display = 'block';
            
            const totalAmount = parseFloat(document.getElementById('totalAmount').value);
            const advancePaid = parseFloat(document.getElementById('advancePaid').value);
            const paymentType = document.querySelector('input[name="paymentType"]:checked').value;
            
            // Basic validation
            if (totalAmount <= 0) {
                showAlert('Total Amount must be positive.', 'error');
                loading.style.display = 'none';
                return;
            }
            
            // Validation based on payment type
            if (paymentType === 'advance') {
                if (advancePaid <= 0 || advancePaid >= totalAmount) {
                    showAlert('For Advance, paid amount must be greater than 0 and less than total amount.', 'error');
                    loading.style.display = 'none';
                    return;
                }
            } else if (paymentType === 'rest') {
                // For REST: advancePaid is the already paid amount
                if (advancePaid <= 0 || advancePaid >= totalAmount) {
                    showAlert('For Rest, advanced amount must be greater than 0 and less than total amount.', 'error');
                    loading.style.display = 'none';
                    return;
                }
            } else if (paymentType === 'full') {
                if (advancePaid !== totalAmount) {
                    showAlert('For Full, paid amount must equal total amount.', 'error');
                    loading.style.display = 'none';
                    return;
                }
            }
            
            const data = {
                customer_name: document.getElementById('customerName').value,
                phone: document.getElementById('phone').value,
                description: document.getElementById('description').value,
                total_amount: totalAmount,
                advance_paid: advancePaid,
                payment_type: paymentType
            };
            
            try {
                const response = await fetch('/api/invoices', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showAlert('Invoice created successfully!', 'success');
                    document.getElementById('invoiceForm').reset();
                    setupPaymentTypeHandlers(); // Reset radio button handlers
                    loadInvoices();
                } else {
                    showAlert(result.error || 'Error creating invoice', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            } finally {
                loading.style.display = 'none';
            }
        });
        
        async function loadInvoices() {
            try {
                const response = await fetch('/api/invoices');
                const invoices = await response.json();
                
                // Filter invoices based on current filter
                let filteredInvoices = invoices;
                if (currentFilter !== 'all') {
                    filteredInvoices = invoices.filter(inv => {
                        const type = inv.type.toLowerCase();
                        return type === currentFilter;
                    });
                }
                
                const invoicesList = document.getElementById('invoicesList');
                
                if (filteredInvoices.length === 0) {
                    invoicesList.innerHTML = '<div class="no-invoices">No invoices yet. Create one to get started!</div>';
                    return;
                }
                
                invoicesList.innerHTML = filteredInvoices.reverse().map(inv => {
                    let typeLabel = '';
                    let typeClass = '';
                    let statusLabel = '';
                    let isCompleted = false;
                    
                    if (inv.type === 'ADVANCE') {
                        typeLabel = 'Advance';
                        typeClass = 'type-advance';
                        statusLabel = '⏳ Pending';
                        isCompleted = false;
                    } else if (inv.type === 'REST') {
                        typeLabel = 'Rest';
                        typeClass = 'type-rest';
                        statusLabel = '✅ Completed';
                        isCompleted = true;
                    } else if (inv.type === 'FULL') {
                        typeLabel = 'Full';
                        typeClass = 'type-final';
                        statusLabel = '✅ Completed';
                        isCompleted = true;
                    }
                    
                    return `
                    <div class="invoice-item" style="position: relative;">
                        ${isCompleted ? '<div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 48px; font-weight: bold; color: rgba(76, 175, 80, 0.15); z-index: 1; pointer-events: none; width: 200px; text-align: center;">PAID</div>' : ''}
                        <div class="invoice-header">
                            <span class="invoice-id">INV-${String(inv.id).padStart(3, '0')}</span>
                            <span class="invoice-type ${typeClass}">
                                ${typeLabel}
                            </span>
                        </div>
                        <div class="invoice-details">
                            <strong>${inv.customer_name}</strong> | ${inv.phone}<br>
                            Amount: $${inv.total_amount.toFixed(2)} | ${inv.rest_amount !== undefined && inv.rest_amount > 0 ? 'Rest: $' + inv.rest_amount.toFixed(2) : 'Balance: $' + inv.balance.toFixed(2)}<br>
                            Status: <b>${statusLabel}</b> | Date: ${inv.date}
                        </div>
                        <div class="invoice-actions">
                            <button class="btn-small btn-download" onclick="viewInvoice(${inv.id})">
                                👁️ View Invoice
                            </button>
                            <button class="btn-small btn-delete" onclick="deleteInvoice(${inv.id})">
                                🗑️ Delete
                            </button>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading invoices:', error);
            }
        }
        
        function viewInvoice(id) {
            window.location.href = `/invoice/${id}`;
        }
        
        async function deleteInvoice(id) {
            if (!confirm('Are you sure you want to delete this invoice?')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/invoices/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showAlert('Invoice deleted successfully!', 'success');
                    loadInvoices();
                } else {
                    showAlert('Error deleting invoice', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }
        
        function filterInvoices(filter) {
            currentFilter = filter;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
            
            // Reload invoices with new filter
            loadInvoices();
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} success-message`;
            alert.textContent = message;
            
            if (type === 'success') {
                setTimeout(() => {
                    alert.innerHTML = '';
                }, 3000);
            }
        }
    </script>
</body>
</html>
